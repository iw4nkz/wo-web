<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WO Pangkalan Bun | Mewujudkan Pernikahan Impian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md shadow-sm p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-amber-700">Cita & Rias</h1>
            <div class="space-x-6 hidden md:block">
                <a href="#" class="hover:text-amber-600 transition">Home</a>
                <a href="#paket" class="hover:text-amber-600 transition">Paket</a>
                <a href="#booking" class="bg-amber-700 text-white px-5 py-2 rounded-full hover:bg-amber-800">Booking</a>
            </div>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative overflow-hidden">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80" class="absolute inset-0 w-full h-full object-cover brightness-50" alt="Wedding Background">
        <div class="relative z-10 text-center text-white px-4 max-w-4xl">
            <h2 id="hero-title" class="text-4xl md:text-6xl mb-4 leading-tight">Loading judul impian...</h2>
            <p id="about-text" class="text-lg md:text-xl mb-8 font-light italic">Loading deskripsi...</p>
            <a href="#booking" class="border-2 border-white px-10 py-3 rounded-full hover:bg-white hover:text-amber-900 transition-all font-semibold">Konsultasi Sekarang</a>
        </div>
    </section>

    <section id="paket" class="py-20 bg-amber-50/50 px-4">
        <div class="max-w-6xl mx-auto text-center">
            <h3 class="text-3xl font-bold mb-12 text-amber-900">Paket Unggulan Kami</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                
                <div class="bg-white p-8 rounded-2xl shadow-md border border-amber-100 text-left flex flex-column justify-between">
                    <div>
                        <h4 class="text-2xl font-bold text-slate-700 mb-2">Paket Silver</h4>
                        <p id="harga-silver" class="text-3xl font-bold text-amber-700 mb-4">Loading harga...</p>
                        <p id="paket-silver" class="text-slate-600 leading-relaxed text-sm md:text-base">Loading detail paket silver...</p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-md border-2 border-amber-500 text-left relative flex flex-column justify-between">
                    <span class="absolute -top-3 left-6 bg-amber-500 text-white text-xs px-3 py-1 rounded-full uppercase font-bold">Terpopuler</span>
                    <div>
                        <h4 class="text-2xl font-bold text-slate-700 mb-2">Paket Gold</h4>
                        <p id="harga-gold" class="text-3xl font-bold text-amber-700 mb-4">Loading harga...</p>
                        <p id="paket-gold" class="text-slate-600 leading-relaxed text-sm md:text-base">Loading detail paket gold...</p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section id="booking" class="py-20 px-4">
        <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-8">
            <h3 class="text-3xl font-bold text-center mb-6 text-slate-700">Formulir Pertemuan</h3>
            <form id="weddingForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Nama Lengkap</label>
                    <input type="text" name="nama" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">WhatsApp</label>
                    <input type="tel" name="whatsapp" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Tanggal Acara</label>
                    <input type="date" name="tanggal" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Pilih Paket</label>
                    <select name="paket" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                        <option value="Silver">Paket Silver (Ekonomis)</option>
                        <option value="Gold">Paket Gold (Favorit)</option>
                        <option value="Custom">Custom Service</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Pesan / Catatan Tambahan</label>
                    <textarea name="pesan" rows="3" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Contoh: Konsep outdoor, request warna dekorasi maroon, dll."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-amber-700 text-white py-4 rounded-xl font-bold hover:bg-amber-800 transition">KIRIM JADWAL KONSULTASI</button>
            </form>
            <div id="responseMsg" class="mt-4 text-center hidden font-semibold"></div>
        </div>
    </section>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-aTwKl1ien7KCuEyxg_kXaVTn5gS2_BTQKkMHwjriT6pYFACdUkglmVahntfr7lKm/exec';
        const form = document.getElementById('weddingForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "Mengirim...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.disabled = false;
                btn.innerHTML = "KIRIM JADWAL KONSULTASI";
                msg.classList.remove('hidden');
                msg.innerHTML = "Terima kasih! Kami akan segera menghubungi kamu via WA.";
                msg.classList.add('text-green-600');
                form.reset();
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerHTML = "KIRIM JADWAL KONSULTASI";
                msg.classList.remove('hidden');
                msg.innerHTML = "Oops, terjadi kesalahan. Coba lagi, Bre!";
                msg.classList.add('text-red-600');
            });
        });

        // FUNGSI UNTUK MENGAMBIL DATA DARI GOOGLE SHEET KONTEN
        async function loadContent() {
            try {
                const response = await fetch(scriptURL, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain'
                    }
                });
                const data = await response.json();
                
                data.forEach(item => {
                    const element = document.getElementById(item.id);
                    if (element) {
                        element.innerHTML = item.deskripsi;
                    }
                });
            } catch (error) {
                console.error("Gagal memuat konten dinamis:", error);
            }
        }

        // Jalankan fungsi loadContent begitu halaman selesai dimuat
        window.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
