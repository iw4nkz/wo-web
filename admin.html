<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamar Admin | WO Pangkalan Bun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen pb-12">

    <div class="bg-amber-700 text-white shadow-md p-6 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Kamar Kendali Admin</h1>
                <p class="text-amber-100 text-sm">Kelola konten website WO Pangkalan Bun dengan mudah</p>
            </div>
            <span class="bg-amber-600 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider">Tab Galeri Active</span>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="text-xl font-bold text-amber-900 mb-4 flex items-center gap-2">📂 Teks & Konten Utama Website</h3>
            <div id="textFormContainer" class="space-y-4">
                <p class="text-slate-500 italic text-sm">Mengambil data teks...</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="text-xl font-bold text-amber-900 mb-2 flex items-center gap-2">📸 Galeri Dokumentasi (Tab Galeri)</h3>
            <p class="text-xs text-slate-500 mb-4">Masukkan semua link foto dokumentasi. **Pisahkan setiap link dengan menekan tombol Enter (Satu baris, satu link)**.</p>
            
            <form onsubmit="saveGalleryBulk(event)" class="space-y-3">
                <div>
                    <textarea id="gallery_textarea" rows="8" class="w-full border border-slate-300 p-4 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-mono text-xs leading-relaxed" placeholder="https://images.unsplash.com/photo-1...\nhttps://images.unsplash.com/photo-2..."></textarea>
                </div>
                <div class="flex justify-end">
                    <button type="submit" id="btn-gallery-bulk" class="bg-amber-700 hover:bg-amber-800 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition shadow-sm flex items-center gap-2">
                        💾 Simpan Semua Gambar Ke Tab Galeri
                    </button>
                </div>
            </form>
        </div>

    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbytTqkazoRJ5I850ewt0ZXbA76sV7MP1PEeZv3my1s-CKqJJF5k-cRRsLR1rwj_6Ib5/exec';

        function handleAdminContent(response) {
            const container = document.getElementById('textFormContainer');
            const galleryTextarea = document.getElementById('gallery_textarea');
            
            // 1. Render data link dari tab "Galeri" ke dalam textarea tunggal
            if (response.galeri && response.galeri.length > 0) {
                galleryTextarea.value = response.galeri.join('\n');
            }

            // 2. Render form teks dari tab "Konten"
            if (response.konten && response.konten.length > 0) {
                container.innerHTML = '';
                response.konten.forEach(item => {
                    let idClean = item.id ? item.id.trim() : '';
                    if(!idClean || idClean.startsWith('gallery-img')) return; // Lewati sisa id gallery-img usang

                    const formBox = document.createElement('form');
                    formBox.className = "flex flex-col md:flex-row md:items-end gap-3 p-4 bg-slate-50 rounded-xl border border-slate-100";
                    formBox.onsubmit = (e) => saveTextData(e, idClean);

                    formBox.innerHTML = `
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">${idClean}</label>
                            <input type="text" name="deskripsi" value="${item.deskripsi || ''}" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none bg-white">
                        </div>
                        <button type="submit" id="btn-${idClean}" class="bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold uppercase tracking-wider px-4 py-3 rounded-lg transition shadow-sm">
                            Simpan
                        </button>
                    `;
                    container.appendChild(formBox);
                });
            }
        }

        function saveTextData(e, id) {
            e.preventDefault();
            const button = document.getElementById(`btn-${id}`);
            const inputValue = e.target.querySelector('input[name="deskripsi"]').value;
            button.disabled = true;
            button.innerHTML = "Proses...";
            sendData(id, inputValue, button, "Simpan");
        }

        function saveGalleryBulk(e) {
            e.preventDefault();
            const button = document.getElementById('btn-gallery-bulk');
            const textareaValue = document.getElementById('gallery_textarea').value;
            
            // Gabung link baris baru jadi satu string dipisahkan '||'
            const formattedLinks = textareaValue.split('\n').map(link => link.trim()).filter(link => link !== '').join('||');

            button.disabled = true;
            button.innerHTML = "Menata Baris Sheet...";
            sendData('gallery-bulk-save', formattedLinks, button, "💾 Simpan Semua Gambar Ke Tab Galeri");
        }

        function sendData(id, value, button, originalText) {
            const formData = new FormData();
            formData.append('id', id);
            formData.append('deskripsi', value);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(response => {
                alert(response.message || "Berhasil diperbarui!");
                button.disabled = false;
                button.innerHTML = originalText;
            })
            .catch(err => {
                alert("Gagal koneksi atau simpan, Bre!");
                button.disabled = false;
                button.innerHTML = originalText;
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            script.src = `${scriptURL}?callback=handleAdminContent`;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
