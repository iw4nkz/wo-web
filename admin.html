<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kamar Admin | WO Pangkalan Bun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f3ef; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .tab-active { background: #b45309; color: white; }
        .animate-spin-slow { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="bg-amber-800 text-white shadow-md p-6 mb-6">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold">🏠 Kamar Admin</h1>
                <p class="text-amber-100 text-sm">Kelola website & pantau pesanan</p>
            </div>
            <div class="flex bg-amber-900 p-1 rounded-xl gap-1">
                <button onclick="switchTab('konten-panel')" id="btnKonten" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold transition tab-active">
                    📝 Konten & Galeri
                </button>
                <button onclick="switchTab('pesan-panel')" id="btnPesan" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold transition text-amber-200 hover:text-white">
                    💬 Pesan Masuk <span id="pesan-count" class="ml-1">(0)</span>
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4">
        
        <!-- TAB KONTEN & GALERI -->
        <div id="konten-panel" class="tab-content space-y-6">
            <!-- Form Teks Konten -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-xl font-bold text-amber-900 mb-4">📝 Teks & Konten Website</h3>
                <div id="textFormContainer" class="space-y-3">
                    <p class="text-slate-400 italic">Memuat data...</p>
                </div>
            </div>

            <!-- Form Galeri Bulk -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-xl font-bold text-amber-900 mb-2">📸 Galeri Slideshow</h3>
                <p class="text-xs text-slate-500 mb-3">Pisahkan setiap link gambar dengan baris baru (Enter).</p>
                <textarea id="gallery_textarea" rows="6" class="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-amber-500 font-mono text-sm"></textarea>
                <button onclick="saveGalleryBulk()" id="btnGallery" class="mt-4 bg-amber-700 hover:bg-amber-800 text-white font-semibold px-5 py-2 rounded-lg transition">
                    💾 Simpan Galeri
                </button>
            </div>
        </div>

        <!-- TAB PESAN MASUK -->
        <div id="pesan-panel" class="tab-content hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-amber-900">💬 Pesan Booking Masuk</h3>
                    <button onclick="refreshPesan()" class="text-sm bg-slate-100 px-3 py-1.5 rounded-lg">🔄 Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-100">
                            <tr>
                                <th class="p-3 text-sm">Nama</th>
                                <th class="p-3 text-sm">WhatsApp</th>
                                <th class="p-3 text-sm">Tanggal Acara</th>
                                <th class="p-3 text-sm">Paket</th>
                                <th class="p-3 text-sm">Pesan</th>
                                <th class="p-3 text-sm">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="pesanTableBody">
                            <tr><td colspan="6" class="p-8 text-center text-slate-400">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbytTqkazoRJ5I850ewt0ZXbA76sV7MP1PEeZv3my1s-CKqJJF5k-cRRsLR1rwj_6Ib5/exec';
        
        // ========== SWITCH TAB ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active', 'bg-amber-700', 'text-white');
                btn.classList.add('text-amber-200');
            });
            
            const activeBtn = tabId === 'konten-panel' ? 'btnKonten' : 'btnPesan';
            const btn = document.getElementById(activeBtn);
            btn.classList.add('tab-active', 'bg-amber-700', 'text-white');
            btn.classList.remove('text-amber-200');
            
            if (tabId === 'pesan-panel') loadPesanData();
        }
        
        // ========== LOAD KONTEN & GALERI ==========
        function loadData() {
            const script = document.createElement('script');
            script.src = `${scriptURL}?callback=handleAdminContent`;
            document.body.appendChild(script);
        }
        
        function handleAdminContent(response) {
            // Render Teks Konten
            const container = document.getElementById('textFormContainer');
            const galleryTextarea = document.getElementById('gallery_textarea');
            
            if (response.konten && response.konten.length) {
                container.innerHTML = '';
                response.konten.forEach(item => {
                    if (!item.id) return;
                    const div = document.createElement('div');
                    div.className = 'flex flex-col sm:flex-row gap-2 items-center';
                    div.innerHTML = `
                        <div class="flex-1 w-full">
                            <label class="block text-xs font-bold text-slate-500 mb-1">${item.id}</label>
                            <input type="text" id="input-${item.id}" value="${escapeHtml(item.deskripsi || '')}" class="w-full border border-slate-300 p-2 rounded-lg text-sm">
                        </div>
                        <button onclick="updateKonten('${item.id}')" class="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm whitespace-nowrap">💾 Simpan</button>
                    `;
                    container.appendChild(div);
                });
            }
            
            // Render Galeri (ke textarea)
            if (response.galeri && response.galeri.length) {
                galleryTextarea.value = response.galeri.join('\n');
            }
        }
        
        function updateKonten(id) {
            const value = document.getElementById(`input-${id}`).value;
            const formData = new FormData();
            formData.append('id', id);
            formData.append('deskripsi', value);
            
            fetch(scriptURL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    Swal.fire('Berhasil!', res.message, 'success');
                })
                .catch(() => Swal.fire('Gagal!', 'Coba lagi', 'error'));
        }
        
        function saveGalleryBulk() {
            const value = document.getElementById('gallery_textarea').value;
            const formData = new FormData();
            formData.append('id', 'gallery-bulk-save');
            formData.append('deskripsi', value.split('\n').filter(l => l.trim()).join('||'));
            
            fetch(scriptURL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    Swal.fire('Berhasil!', res.message, 'success');
                    loadData();
                })
                .catch(() => Swal.fire('Gagal!', 'Coba lagi', 'error'));
        }
        
        // ========== LOAD PESAN ==========
        function loadPesanData() {
            const script = document.createElement('script');
            script.src = `${scriptURL}?callback=handlePesanData`;
            document.body.appendChild(script);
        }
        
        function handlePesanData(response) {
            const tbody = document.getElementById('pesanTableBody');
            const pesanCount = document.getElementById('pesan-count');
            const messages = response.pesan || [];
            
            pesanCount.innerText = messages.length;
            
            if (!messages.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400">Belum ada pesan masuk</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            messages.reverse().forEach((msg, idx) => {
                const row = tbody.insertRow();
                const waNumber = String(msg.whatsapp || '').replace(/[^0-9]/g, '');
                const finalWa = waNumber.startsWith('0') ? '62' + waNumber.substring(1) : (waNumber.startsWith('8') ? '62' + waNumber : waNumber);
                
                row.innerHTML = `
                    <td class="p-3 font-medium">${escapeHtml(msg.nama)}</td>
                    <td class="p-3"><a href="https://wa.me/${finalWa}" target="_blank" class="text-green-600 hover:underline">${escapeHtml(msg.whatsapp)}</a></td>
                    <td class="p-3">${escapeHtml(msg.tanggal)}</td>
                    <td class="p-3"><span class="bg-amber-100 text-amber-800 px-2 py-1 rounded-full text-xs">${escapeHtml(msg.paket)}</span></td>
                    <td class="p-3 max-w-xs truncate">${escapeHtml(msg.pesan)}</td>
                    <td class="p-3"><button onclick="hapusPesan(${idx})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs">🗑️ Hapus</button></td>
                `;
            });
            
            window.currentMessages = messages;
        }
        
        function hapusPesan(index) {
            const msg = window.currentMessages?.[index];
            if (!msg) return;
            
            Swal.fire({
                title: 'Hapus pesan?',
                text: `Hapus pesan dari ${msg.nama}?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Ya, hapus!'
            }).then(result => {
                if (result.isConfirmed) {
                    const formData = new FormData();
                    formData.append('action', 'hapusPesan');
                    formData.append('nama', msg.nama);
                    formData.append('tanggal', msg.tanggal);
                    
                    fetch(scriptURL, { method: 'POST', body: formData })
                        .then(res => res.json())
                        .then(res => {
                            if (res.status === 'success') {
                                Swal.fire('Terhapus!', res.message, 'success');
                                loadPesanData();
                            } else {
                                Swal.fire('Gagal!', res.message, 'error');
                            }
                        })
                        .catch(() => Swal.fire('Error!', 'Gagal menghapus', 'error'));
                }
            });
        }
        
        function refreshPesan() {
            loadPesanData();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.onload = () => {
            loadData();
        };
    </script>
</body>
</html>
